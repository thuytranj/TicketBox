worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    resolver 127.0.0.11 valid=5s;
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/lualib/?.lua;;";

    # --- CLOUDFLARE REAL IP CONFIGURATION ---
    # Danh sách các dải IP của Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # Dải IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # Đọc IP thật từ header CF-Connecting-IP của Cloudflare
    real_ip_header CF-Connecting-IP;
    # ----------------------------------------

    # Khai báo zone: 10MB shared memory, 50 req/s per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=50r/s;

    upstream ticketbox_api_backend {
        server ticketbox-api:3000;
    }

    server {
        listen 80;
        server_name api.ticketboxz.me localhost;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        location = /api/v1/bookings {
            access_by_lua_file /etc/nginx/lua/bookings-guard.lua;

            proxy_pass http://ticketbox_api_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_buffering off;
        }

        location = /api/v1/payments/momo {
            access_by_lua_file /etc/nginx/lua/payments-guard.lua;

            proxy_pass http://ticketbox_api_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_buffering off;
        }

        location = /api/v1/payments/vnpay {
            access_by_lua_file /etc/nginx/lua/payments-guard.lua;

            proxy_pass http://ticketbox_api_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_buffering off;
        }


        location / {
            # burst=30: cho phép burst tối đa 30 request vượt ngưỡng
            # nodelay: xử lý burst ngay lập tức, không queue chờ
            limit_req zone=global burst=30 nodelay;
            limit_req_status 429;
            error_page 429 = @rate_limit_exceeded;

            proxy_pass http://ticketbox_api_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "upgrade";
            
            proxy_buffering off;
        }

        location @rate_limit_exceeded {
            default_type application/json;
            add_header X-RateLimit-Source "gateway" always;
            return 429 '{"statusCode":429,"message":"Too many requests. Please slow down."}';
        }
    }
}
